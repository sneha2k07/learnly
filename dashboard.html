<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Set this to your Railway backend URL before deploying -->
  <meta name="api-url" content="http://localhost:8000" />
  <title>Learnly AI – Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0d0d0d; --paper: #f5f0e8; --cream: #ede8da;
      --accent: #e8512a; --muted: #7a7060; --border: rgba(13,13,13,0.12);
      --card: #fff9ee; --green: #2d9e5f; --blue: #2a7ae8;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; display: flex; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--ink);
      display: flex; flex-direction: column; padding: 1.5rem 1rem;
      position: fixed; top: 0; left: 0; bottom: 0;
    }
    .logo { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 900; color: var(--paper); padding: 0.5rem 0.8rem 1.5rem; }
    .logo span { color: var(--accent); }
    .nav-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.65rem 0.8rem; border-radius: 10px; cursor: pointer;
      color: rgba(245,240,232,0.55); font-size: 0.88rem; font-weight: 500;
      transition: background 0.15s, color 0.15s; user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: var(--paper); }
    .nav-item.active { background: rgba(232,81,42,0.2); color: var(--accent); }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; }
    .user-pill {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; border-radius: 10px;
      background: rgba(255,255,255,0.06);
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: white; flex-shrink: 0;
    }
    .user-info { overflow: hidden; }
    .user-name { font-size: 0.82rem; font-weight: 500; color: var(--paper); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-plan { font-size: 0.7rem; color: rgba(245,240,232,0.45); }

    /* ── MAIN ── */
    .main { margin-left: 240px; flex: 1; padding: 2.5rem; min-height: 100vh; }

    /* ── TOP BAR ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2.5rem; }
    .topbar h1 { font-family: 'Fraunces', serif; font-size: 1.8rem; font-weight: 900; letter-spacing: -0.03em; }
    .btn { padding: 0.65rem 1.4rem; border-radius: 100px; font-size: 0.88rem; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--ink); color: var(--paper); }
    .btn-primary:hover { background: var(--accent); }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
    .btn-outline:hover { border-color: var(--ink); }
    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.78rem; }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn-danger:hover { background: #b91c1c; color: white; }

    /* ── STATS ── */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.3rem 1.5rem; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
    .stat-value { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em; margin-top: 0.2rem; }
    .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── CARDS ── */
    .section-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .doc-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 1.4rem; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .doc-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,13,13,0.08); }
    .doc-type-badge {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      margin-bottom: 0.7rem; background: var(--cream); color: var(--muted);
    }
    .doc-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .doc-meta { font-size: 0.75rem; color: var(--muted); }
    .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
    .status-ready { background: var(--green); }
    .status-processing { background: orange; }
    .status-error { background: #ef4444; }
    .doc-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    /* ── UPLOAD AREA ── */
    .upload-zone {
      border: 2px dashed var(--border); border-radius: 16px;
      padding: 2.5rem; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; margin-bottom: 2rem;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(232,81,42,0.04); }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 2rem; margin-bottom: 0.6rem; }
    .upload-text { font-weight: 500; }
    .upload-sub { font-size: 0.8rem; color: var(--muted); margin-top: 0.3rem; }

    /* ── STUDY VIEW ── */
    .study-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .study-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .tab {
      padding: 0.5rem 1.1rem; border-radius: 100px; font-size: 0.82rem; font-weight: 500;
      cursor: pointer; border: 1.5px solid var(--border); background: transparent;
      transition: all 0.15s; color: var(--ink);
    }
    .tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .tab:hover:not(.active) { border-color: var(--ink); }

    .asset-panel { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2rem; }
    .loading { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 0.8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Notes */
    .notes-summary { background: var(--cream); border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.7; }
    .notes-section h4 { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; margin: 1.2rem 0 0.5rem; }
    .notes-section ul { padding-left: 1.2rem; }
    .notes-section li { font-size: 0.88rem; line-height: 1.7; color: var(--ink); margin-bottom: 0.2rem; }
    .concept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.8rem; margin-bottom: 1.2rem; }
    .concept-card { background: var(--cream); border-radius: 10px; padding: 0.9rem; }
    .concept-term { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .concept-def { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    .takeaway { display: flex; gap: 0.5rem; align-items: flex-start; padding: 0.6rem 0; border-top: 1px solid var(--border); font-size: 0.88rem; }
    .takeaway::before { content: '→'; color: var(--accent); font-weight: 700; flex-shrink: 0; }

    /* Flashcards */
    .fc-container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .fc-counter { font-size: 0.82rem; color: var(--muted); }
    .fc-card {
      width: 100%; max-width: 480px; min-height: 200px;
      background: var(--ink); border-radius: 20px; padding: 2.5rem;
      display: flex; align-items: center; justify-content: center; text-align: center;
      cursor: pointer; user-select: none;
      transition: transform 0.15s; position: relative;
    }
    .fc-card:hover { transform: translateY(-2px); }
    .fc-front { color: var(--paper); font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 700; }
    .fc-back { color: rgba(245,240,232,0.85); font-size: 0.95rem; line-height: 1.65; display: none; }
    .fc-card.flipped .fc-front { display: none; }
    .fc-card.flipped .fc-back { display: block; }
    .fc-hint { font-size: 0.75rem; color: var(--muted); }
    .fc-nav { display: flex; gap: 1rem; }
    .diff-badge { position: absolute; top: 1rem; right: 1rem; padding: 0.2rem 0.6rem; border-radius: 100px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
    .diff-easy { background: rgba(45,158,95,0.2); color: var(--green); }
    .diff-medium { background: rgba(201,168,76,0.2); color: #8a6d10; }
    .diff-hard { background: rgba(232,81,42,0.2); color: var(--accent); }

    /* Quiz */
    .quiz-q { margin-bottom: 1.8rem; }
    .quiz-q-text { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.8rem; }
    .quiz-options { display: flex; flex-direction: column; gap: 0.5rem; }
    .quiz-option {
      padding: 0.7rem 1rem; border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; font-size: 0.88rem; transition: all 0.12s; text-align: left; background: transparent;
    }
    .quiz-option:hover { border-color: var(--ink); background: var(--cream); }
    .quiz-option.correct { border-color: var(--green); background: rgba(45,158,95,0.08); color: var(--green); }
    .quiz-option.wrong { border-color: #ef4444; background: rgba(239,68,68,0.08); color: #b91c1c; }
    .quiz-explanation { margin-top: 0.6rem; font-size: 0.82rem; color: var(--muted); padding: 0.7rem; background: var(--cream); border-radius: 8px; display: none; }
    .quiz-score { font-family: 'Fraunces', serif; font-size: 2.5rem; font-weight: 900; text-align: center; padding: 2rem; }

    /* Podcast */
    .podcast-line { display: flex; gap: 0.8rem; padding: 0.7rem 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
    .speaker-tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; padding: 0.2rem 0.6rem; border-radius: 100px; flex-shrink: 0; margin-top: 0.1rem; }
    .speaker-alex { background: rgba(42,122,232,0.15); color: var(--blue); }
    .speaker-sam { background: rgba(232,81,42,0.15); color: var(--accent); }
    .podcast-text { font-size: 0.88rem; line-height: 1.65; }

    /* Mindmap */
    .mindmap-root { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 900; text-align: center; padding: 1rem; background: var(--ink); color: var(--paper); border-radius: 14px; margin-bottom: 1.5rem; }
    .mindmap-branch { margin-bottom: 1.2rem; }
    .branch-topic { font-weight: 700; font-size: 0.95rem; padding: 0.5rem 0.8rem; background: var(--cream); border-radius: 8px; margin-bottom: 0.5rem; border-left: 3px solid var(--accent); }
    .branch-subtopics { padding-left: 1.2rem; display: flex; flex-direction: column; gap: 0.35rem; }
    .subtopic { font-size: 0.83rem; color: var(--muted); padding: 0.3rem 0; display: flex; gap: 0.4rem; }
    .subtopic::before { content: '•'; color: var(--accent); }

    /* Chat */
    .chat-window { display: flex; flex-direction: column; height: 400px; }
    .chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; padding-bottom: 1rem; }
    .chat-msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 14px; font-size: 0.88rem; line-height: 1.6; }
    .chat-msg.user { align-self: flex-end; background: var(--ink); color: var(--paper); border-bottom-right-radius: 4px; }
    .chat-msg.assistant { align-self: flex-start; background: var(--cream); border-bottom-left-radius: 4px; }
    .chat-input-row { display: flex; gap: 0.6rem; margin-top: 0.8rem; }
    .chat-input { flex: 1; padding: 0.7rem 1rem; border: 1.5px solid var(--border); border-radius: 100px; font-size: 0.88rem; font-family: inherit; outline: none; background: white; }
    .chat-input:focus { border-color: var(--ink); }

    /* ── AUTH ── */
    .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; background: var(--paper); }
    .auth-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; width: 380px; max-width: 92vw; }
    .auth-logo { font-family: 'Fraunces', serif; font-size: 2rem; font-weight: 900; margin-bottom: 0.3rem; }
    .auth-logo span { color: var(--accent); }
    .auth-sub { color: var(--muted); font-size: 0.88rem; margin-bottom: 2rem; font-weight: 300; }
    .form-group { margin-bottom: 1rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.4rem; display: block; }
    .form-input { width: 100%; padding: 0.7rem 1rem; border: 1.5px solid var(--border); border-radius: 10px; font-size: 0.88rem; font-family: inherit; outline: none; background: white; }
    .form-input:focus { border-color: var(--ink); }
    .auth-toggle { text-align: center; margin-top: 1.2rem; font-size: 0.82rem; color: var(--muted); }
    .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: underline; }
    .error-msg { background: #fee2e2; color: #b91c1c; padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }

    /* ── MISC ── */
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .tag { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 6px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .tag-green { background: rgba(45,158,95,0.15); color: var(--green); }
    .tag-orange { background: rgba(232,81,42,0.15); color: var(--accent); }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
// In production, set <meta name="api-url" content="https://your-backend.railway.app">
const API = document.querySelector('meta[name="api-url"]')?.content || 'http://localhost:8000';

// ── STATE ─────────────────────────────────────────────────────────────────────
let state = {
  token: localStorage.getItem('learnly_token'),
  user: JSON.parse(localStorage.getItem('learnly_user') || 'null'),
  view: 'dashboard',  // dashboard | study
  documents: [],
  activeDoc: null,
  activeTab: 'notes',
  assets: {},         // { docId: { notes: {...}, flashcards: {...}, ... } }
  fcIndex: 0,
  fcFlipped: false,
  quizAnswers: {},
  chatMessages: [],
  loading: false,
  error: null,
  authMode: 'login',
};

function setState(patch) { Object.assign(state, patch); render(); }

// ── API HELPERS ───────────────────────────────────────────────────────────────
async function api(method, path, body, isForm = false) {
  const headers = {};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  if (body && !isForm) headers['Content-Type'] = 'application/json';

  const res = await fetch(API + path, {
    method,
    headers,
    body: isForm ? body : (body ? JSON.stringify(body) : undefined),
  });

  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || 'Request failed');
  return data;
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
async function login(email, password) {
  const form = new URLSearchParams({ username: email, password });
  const data = await api('POST', '/api/auth/login', form, true);
  setState({ token: data.access_token, user: data.user, error: null });
  localStorage.setItem('learnly_token', data.access_token);
  localStorage.setItem('learnly_user', JSON.stringify(data.user));
  loadDocuments();
}

async function register(name, email, password) {
  const data = await api('POST', '/api/auth/register', { name, email, password });
  setState({ token: data.access_token, user: data.user, error: null });
  localStorage.setItem('learnly_token', data.access_token);
  localStorage.setItem('learnly_user', JSON.stringify(data.user));
  loadDocuments();
}

function logout() {
  localStorage.removeItem('learnly_token');
  localStorage.removeItem('learnly_user');
  setState({ token: null, user: null, view: 'dashboard', documents: [], assets: {} });
}

// ── DOCUMENTS ─────────────────────────────────────────────────────────────────
async function loadDocuments() {
  try {
    const docs = await api('GET', '/api/documents/');
    setState({ documents: docs });
  } catch (e) { setState({ error: e.message }); }
}

async function uploadFile(file) {
  const fd = new FormData();
  fd.append('file', file);
  try {
    setState({ loading: true });
    await api('POST', '/api/documents/upload', fd, true);
    await loadDocuments();
    setState({ loading: false });
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function deleteDocument(docId) {
  if (!confirm('Delete this document and all its study assets?')) return;
  await api('DELETE', `/api/documents/${docId}`);
  setState({ documents: state.documents.filter(d => d.id !== docId), view: 'dashboard' });
}

// ── STUDY ASSETS ──────────────────────────────────────────────────────────────
async function generateAsset(docId, type) {
  setState({ loading: true, error: null });
  try {
    const data = await api('POST', `/api/study/${docId}/${type}`);
    const assets = { ...state.assets };
    if (!assets[docId]) assets[docId] = {};
    assets[docId][type] = data.content;
    setState({ assets, loading: false, fcIndex: 0, fcFlipped: false, quizAnswers: {} });
  } catch (e) {
    setState({ loading: false, error: e.message });
  }
}

async function sendChat(docId, message) {
  const messages = [...state.chatMessages, { role: 'user', content: message }];
  setState({ chatMessages: messages });
  try {
    const data = await api('POST', `/api/study/${docId}/chat`, { messages });
    setState({ chatMessages: [...messages, { role: 'assistant', content: data.reply }] });
  } catch (e) {
    setState({ error: e.message });
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!state.token) { app.innerHTML = renderAuth(); bindAuth(); return; }
  if (state.view === 'study' && state.activeDoc) { app.innerHTML = renderApp(renderStudy()); }
  else { app.innerHTML = renderApp(renderDashboard()); }
  bindEvents();
}

function renderApp(content) {
  const u = state.user || {};
  return `
  <div class="sidebar">
    <div class="logo">Learn<span>ly</span></div>
    <div class="nav-item ${state.view==='dashboard'?'active':''}" data-nav="dashboard"><span class="nav-icon">📚</span> My Documents</div>
    <div class="nav-item" data-nav="upload"><span class="nav-icon">⬆️</span> Upload</div>
    <div class="sidebar-bottom">
      <div class="user-pill">
        <div class="user-avatar">${(u.name||'?')[0].toUpperCase()}</div>
        <div class="user-info">
          <div class="user-name">${u.name||''}</div>
          <div class="user-plan">${u.plan||'free'} plan · ${u.uploads_this_month||0} uploads</div>
        </div>
      </div>
      <div class="nav-item" style="margin-top:0.5rem" id="logout-btn"><span class="nav-icon">🚪</span> Log out</div>
    </div>
  </div>
  <div class="main">${content}</div>`;
}

function renderDashboard() {
  const docs = state.documents;
  return `
  <div class="topbar">
    <h1>My Documents</h1>
    <label class="btn btn-primary" style="cursor:pointer">
      + Upload <input type="file" id="file-input" style="display:none" accept=".pdf,.docx,.pptx,.txt,.md,.mp3,.mp4,.wav">
    </label>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Total Docs</div><div class="stat-value">${docs.length}</div></div>
    <div class="stat-card"><div class="stat-label">Ready</div><div class="stat-value">${docs.filter(d=>d.status==='ready').length}</div></div>
    <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value">${state.user?.uploads_this_month||0}</div>
      <div class="stat-sub">${state.user?.plan==='free'?'/ 5 free':''}</div></div>
  </div>
  ${state.error?`<div class="error-msg">${state.error}</div>`:''}
  ${state.loading?`<div class="loading"><div class="spinner"></div><br>Uploading...</div>`:''}
  <div class="upload-zone" id="drop-zone">
    <div class="upload-icon">📄</div>
    <div class="upload-text">Drop a file here to upload</div>
    <div class="upload-sub">PDF · DOCX · PPTX · TXT · MP3 · MP4</div>
  </div>
  ${docs.length===0?`<div class="empty"><div class="empty-icon">📂</div><p>No documents yet. Upload one to get started!</p></div>`:
    `<div class="section-title">Your documents</div>
     <div class="doc-grid">${docs.map(renderDocCard).join('')}</div>`}`;
}

function renderDocCard(doc) {
  const ext = doc.file_type.toUpperCase();
  const statusClass = `status-${doc.status}`;
  const date = new Date(doc.created_at).toLocaleDateString();
  return `
  <div class="doc-card" data-doc-id="${doc.id}">
    <div class="doc-type-badge">${ext}</div>
    <div class="doc-title">${doc.title}</div>
    <div class="doc-meta"><span class="status-dot ${statusClass}"></span>${doc.status} · ${date} · ${formatBytes(doc.file_size)}</div>
    <div class="doc-actions">
      <button class="btn btn-outline btn-sm study-btn" data-doc-id="${doc.id}" ${doc.status!=='ready'?'disabled':''}>Study →</button>
      <button class="btn btn-danger btn-sm delete-btn" data-doc-id="${doc.id}">Delete</button>
    </div>
  </div>`;
}

function renderStudy() {
  const doc = state.activeDoc;
  const tabs = ['notes','flashcards','quiz','podcast_script','mindmap','chat'];
  const tabLabels = { notes:'📝 Notes', flashcards:'🃏 Flashcards', quiz:'🧠 Quiz', podcast_script:'🎙️ Podcast', mindmap:'🗺️ Mind Map', chat:'💬 Chat' };

  return `
  <div class="study-header">
    <button class="btn btn-outline btn-sm" id="back-btn">← Back</button>
    <span style="font-weight:600">${doc.title}</span>
    <span class="tag tag-green">${doc.file_type.toUpperCase()}</span>
  </div>
  <div class="study-tabs">
    ${tabs.map(t=>`<button class="tab ${state.activeTab===t?'active':''}" data-tab="${t}">${tabLabels[t]}</button>`).join('')}
  </div>
  <div style="margin-top:1.2rem">
    ${state.error?`<div class="error-msg">${state.error}</div>`:''}
    <div class="asset-panel">${renderAssetPanel()}</div>
  </div>`;
}

function renderAssetPanel() {
  const doc = state.activeDoc;
  const tab = state.activeTab;
  const content = state.assets[doc.id]?.[tab];

  if (state.loading) return `<div class="loading"><div class="spinner"></div><br>Generating with AI…</div>`;

  if (!content) {
    const labels = { notes:'Generate Notes', flashcards:'Generate Flashcards', quiz:'Generate Quiz', podcast_script:'Generate Podcast Script', mindmap:'Generate Mind Map', chat:'Start Chatting' };
    if (tab === 'chat') return renderChat(doc.id);
    return `<div class="empty">
      <div class="empty-icon">✨</div>
      <p style="margin-bottom:1rem">No ${tab} yet for this document.</p>
      <button class="btn btn-primary generate-btn" data-type="${tab}" data-doc="${doc.id}">${labels[tab]}</button>
    </div>`;
  }

  switch(tab) {
    case 'notes': return renderNotes(content);
    case 'flashcards': return renderFlashcards(content);
    case 'quiz': return renderQuiz(content);
    case 'podcast_script': return renderPodcast(content);
    case 'mindmap': return renderMindmap(content);
    case 'chat': return renderChat(doc.id);
    default: return `<pre>${JSON.stringify(content,null,2)}</pre>`;
  }
}

function renderNotes(c) {
  return `
  <div class="notes-summary">${c.summary||''}</div>
  ${c.key_concepts?.length?`<h4 style="margin-bottom:0.8rem;font-family:'Fraunces',serif;font-weight:700">Key Concepts</h4>
  <div class="concept-grid">${c.key_concepts.map(k=>`<div class="concept-card"><div class="concept-term">${k.term}</div><div class="concept-def">${k.definition}</div></div>`).join('')}</div>`:''}
  ${c.sections?.map(s=>`<div class="notes-section"><h4>${s.heading}</h4><ul>${(s.bullets||[]).map(b=>`<li>${b}</li>`).join('')}</ul></div>`).join('')||''}
  ${c.takeaways?.length?`<h4 style="margin:1.5rem 0 0.5rem;font-family:'Fraunces',serif;font-weight:700">Key Takeaways</h4>${c.takeaways.map(t=>`<div class="takeaway">${t}</div>`).join('')}`:''}`;
}

function renderFlashcards(c) {
  const cards = c.flashcards || [];
  const i = state.fcIndex;
  const card = cards[i] || {};
  const diffClass = `diff-${card.difficulty||'medium'}`;
  return `
  <div class="fc-container">
    <div class="fc-counter">${i+1} / ${cards.length}</div>
    <div class="fc-card ${state.fcFlipped?'flipped':''}" id="fc-card">
      <span class="diff-badge ${diffClass}">${card.difficulty||'medium'}</span>
      <div class="fc-front">${card.front||''}</div>
      <div class="fc-back">${card.back||''}</div>
    </div>
    <div class="fc-hint">${state.fcFlipped?'':'Click card to reveal answer'}</div>
    <div class="fc-nav">
      <button class="btn btn-outline btn-sm" id="fc-prev" ${i===0?'disabled':''}>← Prev</button>
      <button class="btn btn-outline btn-sm" id="fc-next" ${i>=cards.length-1?'disabled':''}>Next →</button>
    </div>
  </div>`;
}

function renderQuiz(c) {
  const questions = c.quiz || [];
  const answered = Object.keys(state.quizAnswers).length;
  if (answered === questions.length && questions.length > 0) {
    const score = questions.filter((q,i) => state.quizAnswers[i] === q.correct).length;
    return `<div class="quiz-score">🎉 ${score}/${questions.length}<br><span style="font-size:1rem;font-weight:400;color:var(--muted)">Quiz complete!</span></div>
    <div style="text-align:center"><button class="btn btn-primary" id="quiz-reset">Retry Quiz</button></div>`;
  }
  return questions.map((q,qi) => `
  <div class="quiz-q">
    <div class="quiz-q-text">${qi+1}. ${q.question}</div>
    <div class="quiz-options">
      ${q.options.map(opt => {
        const letter = opt.split('.')[0].trim();
        const chosen = state.quizAnswers[qi];
        let cls = '';
        if (chosen !== undefined) { cls = letter===q.correct?'correct':(letter===chosen?'wrong':''); }
        return `<button class="quiz-option ${cls}" data-qi="${qi}" data-letter="${letter}" ${chosen!==undefined?'disabled':''}>${opt}</button>`;
      }).join('')}
    </div>
    ${state.quizAnswers[qi]!==undefined?`<div class="quiz-explanation" style="display:block">${q.explanation}</div>`:''}
  </div>`).join('');
}

function renderPodcast(c) {
  const lines = c.script || [];
  return `<div style="margin-bottom:1rem;font-size:0.82rem;color:var(--muted)">Episode: <strong>${c.title||''}</strong> · ${c.duration_estimate||''}</div>
  ${lines.map(l=>`<div class="podcast-line">
    <span class="speaker-tag speaker-${(l.speaker||'').toLowerCase()}">${l.speaker}</span>
    <span class="podcast-text">${l.line}</span>
  </div>`).join('')}`;
}

function renderMindmap(c) {
  return `<div class="mindmap-root">${c.root||''}</div>
  ${(c.branches||[]).map(b=>`<div class="mindmap-branch">
    <div class="branch-topic">${b.topic}</div>
    <div class="branch-subtopics">${(b.subtopics||[]).map(s=>`<div class="subtopic">${s.label}${s.detail?` — <em>${s.detail}</em>`:''}</div>`).join('')}</div>
  </div>`).join('')}`;
}

function renderChat(docId) {
  const msgs = state.chatMessages;
  return `
  <div class="chat-window">
    <div class="chat-messages" id="chat-msgs">
      ${msgs.length===0?`<div style="color:var(--muted);font-size:0.85rem;text-align:center;margin-top:2rem">Ask anything about this document…</div>`:''}
      ${msgs.map(m=>`<div class="chat-msg ${m.role}">${m.content}</div>`).join('')}
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" type="text" placeholder="Ask a question…" />
      <button class="btn btn-primary" id="chat-send" data-doc="${docId}">Send</button>
    </div>
  </div>`;
}

function renderAuth() {
  const isLogin = state.authMode === 'login';
  return `
  <div class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">Learn<span>ly</span></div>
      <div class="auth-sub">${isLogin?'Welcome back — log in to continue':'Create your free account'}</div>
      ${state.error?`<div class="error-msg">${state.error}</div>`:''}
      ${!isLogin?`<div class="form-group"><label class="form-label">Name</label><input class="form-input" id="auth-name" placeholder="Your name" /></div>`:''}
      <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="auth-email" type="email" placeholder="you@example.com" /></div>
      <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="auth-password" type="password" placeholder="••••••••" /></div>
      <button class="btn btn-primary" style="width:100%;padding:0.85rem" id="auth-submit">${isLogin?'Log in':'Create account'}</button>
      <div class="auth-toggle">${isLogin?'No account? <a id="toggle-auth">Sign up free</a>':'Already have an account? <a id="toggle-auth">Log in</a>'}</div>
    </div>
  </div>`;
}

// ── BIND ──────────────────────────────────────────────────────────────────────
function bindAuth() {
  document.getElementById('toggle-auth')?.addEventListener('click', () => setState({ authMode: state.authMode==='login'?'register':'login', error: null }));
  document.getElementById('auth-submit')?.addEventListener('click', async () => {
    const email = document.getElementById('auth-email')?.value;
    const password = document.getElementById('auth-password')?.value;
    try {
      if (state.authMode === 'login') { await login(email, password); }
      else { const name = document.getElementById('auth-name')?.value; await register(name, email, password); }
    } catch(e) { setState({ error: e.message }); }
  });
  document.getElementById('auth-password')?.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('auth-submit').click(); });
}

function bindEvents() {
  // Nav
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => {
    const nav = el.dataset.nav;
    if (nav === 'upload') document.getElementById('file-input')?.click();
    else setState({ view: nav, activeDoc: null, error: null });
  }));

  document.getElementById('logout-btn')?.addEventListener('click', logout);

  // File input
  document.getElementById('file-input')?.addEventListener('change', e => {
    if (e.target.files[0]) uploadFile(e.target.files[0]);
  });

  // Drop zone
  const dz = document.getElementById('drop-zone');
  if (dz) {
    ['dragover','dragenter'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag'); }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { dz.classList.remove('drag'); }));
    dz.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if(f) uploadFile(f); });
    dz.addEventListener('click', () => document.getElementById('file-input')?.click());
  }

  // Study buttons
  document.querySelectorAll('.study-btn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    const docId = parseInt(btn.dataset.docId);
    const doc = state.documents.find(d => d.id === docId);
    setState({ view: 'study', activeDoc: doc, activeTab: 'notes', chatMessages: [], error: null });
  }));

  // Delete buttons
  document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', e => {
    e.stopPropagation();
    deleteDocument(parseInt(btn.dataset.docId));
  }));

  // Back button
  document.getElementById('back-btn')?.addEventListener('click', () => setState({ view: 'dashboard', activeDoc: null }));

  // Study tabs
  document.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => {
    setState({ activeTab: btn.dataset.tab, error: null });
  }));

  // Generate asset
  document.querySelectorAll('.generate-btn').forEach(btn => btn.addEventListener('click', () => {
    generateAsset(parseInt(btn.dataset.doc), btn.dataset.type);
  }));

  // Flashcards
  document.getElementById('fc-card')?.addEventListener('click', () => setState({ fcFlipped: !state.fcFlipped }));
  document.getElementById('fc-prev')?.addEventListener('click', () => setState({ fcIndex: state.fcIndex-1, fcFlipped: false }));
  document.getElementById('fc-next')?.addEventListener('click', () => setState({ fcIndex: state.fcIndex+1, fcFlipped: false }));

  // Quiz
  document.querySelectorAll('.quiz-option').forEach(btn => btn.addEventListener('click', () => {
    const qi = parseInt(btn.dataset.qi);
    const letter = btn.dataset.letter;
    const answers = { ...state.quizAnswers, [qi]: letter };
    setState({ quizAnswers: answers });
  }));
  document.getElementById('quiz-reset')?.addEventListener('click', () => setState({ quizAnswers: {} }));

  // Chat
  const sendBtn = document.getElementById('chat-send');
  const chatInput = document.getElementById('chat-input');
  if (sendBtn) {
    const docId = parseInt(sendBtn.dataset.doc);
    sendBtn.addEventListener('click', () => {
      const msg = chatInput.value.trim();
      if (!msg) return;
      chatInput.value = '';
      sendChat(docId, msg);
    });
    chatInput?.addEventListener('keydown', e => { if(e.key==='Enter') sendBtn.click(); });
  }

  // Scroll chat to bottom
  const chatMsgs = document.getElementById('chat-msgs');
  if (chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;

  // Poll processing docs
  if (state.documents.some(d => d.status === 'processing')) {
    setTimeout(() => loadDocuments(), 3000);
  }
}

function formatBytes(b) {
  if (!b) return '—';
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/(1024*1024)).toFixed(1) + ' MB';
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
render();
if (state.token) loadDocuments();
</script>
</body>
</html>
